services:
  postgres:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - mirror_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mirror:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    stdin_open: true
    tty: true

volumes:
  mirror_pgdata:
